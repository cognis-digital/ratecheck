apiVersion: apps/v1
kind: Deployment
metadata: { name: ratecheck, labels: { app: ratecheck } }
spec:
  replicas: 1
  selector: { matchLabels: { app: ratecheck } }
  template:
    metadata: { labels: { app: ratecheck } }
    spec:
      containers:
        - name: ratecheck
          image: ghcr.io/cognis-digital/ratecheck:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: ratecheck }
spec:
  selector: { app: ratecheck }
  ports: [{ port: 80, targetPort: 8000 }]
